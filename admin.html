<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prueba admin</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      padding: 20px;
    }
    .box {
      max-width: 700px;
      margin: 40px auto;
      background: #fff;
      border: 1px solid #dbe4ee;
      border-radius: 16px;
      padding: 20px;
    }
    .estado {
      margin-top: 16px;
      padding: 14px;
      border: 1px solid #dbe4ee;
      border-radius: 12px;
      background: #f8fafc;
      font-size: 20px;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Prueba admin</h1>
    <div id="estado" class="estado">Estado: HTML cargado</div>
  </div>

  <script>
    document.getElementById("estado").textContent = "Estado: JavaScript funcionando";
    alert("JavaScript funcionando");
  </script>
</body>
</html>
