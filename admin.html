<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel de fichajes</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      padding: 20px;
      color: #111827;
    }

    .box {
      max-width: 900px;
      margin: 40px auto;
      background: #fff;
      padding: 20px;
      border-radius: 16px;
      border: 1px solid #dbe4ee;
    }

    h1 {
      margin-bottom: 20px;
      font-size: 28px;
    }

    button {
      padding: 10px 16px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
    }

    .recargar {
      background: #2563eb;
      color: white;
    }

    .borrar {
      background: #dc2626;
      color: white;
    }

    .estado {
      margin: 15px 0;
      padding: 12px;
      border: 1px solid #dbe4ee;
      border-radius: 10px;
      background: #f8fafc;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid #ddd;
      text-align: left;
    }

  </style>
</head>

<body>

<div class="box">
  <h1>Panel de Fichajes</h1>

  <button id="btnRecargar" class="recargar">Recargar</button>

  <div id="estado" class="estado">Estado: iniciando...</div>

  <table>
    <thead>
      <tr>
        <th>Fecha</th>
        <th>Trabajador</th>
        <th>Tipo</th>
        <th>Acción</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<script>
const SUPABASE_URL = "https://fxxfgbxnqhtlrwiyyafu.supabase.co";
const SUPABASE_KEY = "sb_publishable_1RbCV4I_yhpFwZl4wK7e2Q_a6FSyoxC";

const estadoEl = document.getElementById("estado");
const tbody = document.getElementById("tbody");
const btnRecargar = document.getElementById("btnRecargar");

function setEstado(txt) {
  estadoEl.textContent = "Estado: " + txt;
}

function escapeHtml(value) {
  return String(value ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;");
}

async function cargar() {
  setEstado("consultando...");
  tbody.innerHTML = "";

  try {
    const res = await fetch(
      SUPABASE_URL + "/rest/v1/fichajes?select=*&order=created_at.desc",
      {
        headers: {
          apikey: SUPABASE_KEY,
          Authorization: "Bearer " + SUPABASE_KEY
        }
      }
    );

    const data = await res.json();

    if (!res.ok) {
      setEstado("ERROR: " + JSON.stringify(data));
      return;
    }

    if (!data.length) {
      setEstado("sin registros");
      return;
    }

    setEstado("consulta correcta. Registros: " + data.length);

    data.forEach(f => {
      const tr = document.createElement("tr");

      const fecha = new Date(f.created_at).toLocaleString("es-ES");

      tr.innerHTML = `
        <td>${escapeHtml(fecha)}</td>
        <td>${escapeHtml(f.trabajador)}</td>
        <td>${f.tipo === "entrada" ? "Entrada" : "Salida"}</td>
        <td><button class="borrar" data-id="${f.id}">Eliminar</button></td>
      `;

      tbody.appendChild(tr);
    });

    document.querySelectorAll(".borrar").forEach(btn => {
      btn.onclick = async () => {
        if (!confirm("¿Eliminar fichaje?")) return;

        const id = btn.dataset.id;

        await fetch(
          SUPABASE_URL + "/rest/v1/fichajes?id=eq." + id,
          {
            method: "DELETE",
            headers: {
              apikey: SUPABASE_KEY,
              Authorization: "Bearer " + SUPABASE_KEY
            }
          }
        );

        cargar();
      };
    });

  } catch (e) {
    setEstado("ERROR GENERAL: " + e.message);
  }
}

btnRecargar.onclick = cargar;

cargar();
</script>

</body>
</html>
