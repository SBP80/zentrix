<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel de fichajes</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      padding: 20px;
      color: #111827;
    }
    .box {
      max-width: 1000px;
      margin: 40px auto;
      background: #fff;
      padding: 20px;
      border-radius: 16px;
      border: 1px solid #dbe4ee;
    }
    h1 {
      margin: 0 0 20px 0;
      font-size: 28px;
    }
    .topbar {
      margin-bottom: 14px;
    }
    button {
      padding: 10px 14px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 700;
    }
    .recargar {
      background: #2563eb;
      color: white;
    }
    .borrar {
      background: #dc2626;
      color: white;
    }
    .estado {
      margin: 0 0 16px 0;
      padding: 12px;
      border: 1px solid #dbe4ee;
      border-radius: 10px;
      background: #f8fafc;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .tabla-wrap {
      overflow-x: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 760px;
    }
    th, td {
      padding: 10px;
      border-bottom: 1px solid #ddd;
      text-align: left;
      vertical-align: top;
      font-size: 14px;
    }
    .muted {
      color: #64748b;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Panel de Fichajes</h1>

    <div class="topbar">
      <button id="btnRecargar" class="recargar" type="button">Recargar</button>
    </div>

    <div id="estado" class="estado">Estado: iniciando...</div>

    <div class="tabla-wrap">
      <table>
        <thead>
          <tr>
            <th>Fecha</th>
            <th>Trabajador</th>
            <th>Tipo</th>
            <th>Nota</th>
            <th>Dirección</th>
            <th>Lat</th>
            <th>Lng</th>
            <th>Acción</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://fxxfgbxnqhtlrwiyyafu.supabase.co";
    const SUPABASE_KEY = "sb_publishable_1RbCV4I_yhpFwZl4wK7e2Q_a6FSyoxC";

    const estadoEl = document.getElementById("estado");
    const tbody = document.getElementById("tbody");
    const btnRecargar = document.getElementById("btnRecargar");

    function setEstado(txt) {
      estadoEl.textContent = "Estado: " + txt;
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    async function cargar() {
      setEstado("consultando fichajes...");
      tbody.innerHTML = "";

      try {
        const url =
          SUPABASE_URL +
          "/rest/v1/fichajes?select=*&order=created_at.desc";

        const res = await fetch(url, {
          method: "GET",
          headers: {
            apikey: SUPABASE_KEY,
            Authorization: "Bearer " + SUPABASE_KEY,
            Accept: "application/json"
          }
        });

        const text = await res.text();
        let data = [];

        try {
          data = text ? JSON.parse(text) : [];
        } catch {
          setEstado("respuesta no válida: " + text);
          return;
        }

        if (!res.ok) {
          const msg = data?.message || text || ("HTTP " + res.status);
          setEstado("ERROR: " + msg);
          return;
        }

        if (!Array.isArray(data) || data.length === 0) {
          setEstado("consulta correcta, pero no hay registros.");
          return;
        }

        setEstado("consulta correcta. Registros: " + data.length);

        data.forEach((f) => {
          const tr = document.createElement("tr");

          const fecha = f.created_at
            ? new Date(f.created_at).toLocaleString("es-ES")
            : "";

          tr.innerHTML = `
            <td>${escapeHtml(fecha)}</td>
            <td>${escapeHtml(f.trabajador)}</td>
            <td>${escapeHtml(f.tipo)}</td>
            <td>${escapeHtml(f.nota)}</td>
            <td>${escapeHtml(f.direccion)}</td>
            <td>${escapeHtml(f.lat)}</td>
            <td>${escapeHtml(f.lng)}</td>
            <td><button class="borrar" type="button" data-id="${escapeHtml(f.id)}">Eliminar</button></td>
          `;

          tbody.appendChild(tr);
        });

        tbody.querySelectorAll(".borrar").forEach((btn) => {
          btn.addEventListener("click", async () => {
            const id = btn.dataset.id;
            const ok = confirm("¿Eliminar fichaje?");
            if (!ok) return;

            await borrarRegistro(id);
          });
        });
      } catch (error) {
        setEstado("ERROR GENERAL: " + (error?.message || error));
      }
    }

    async function borrarRegistro(id) {
      setEstado("borrando registro " + id + "...");

      try {
        const url =
          SUPABASE_URL +
          "/rest/v1/fichajes?id=eq." +
          encodeURIComponent(id);

        const res = await fetch(url, {
          method: "DELETE",
          headers: {
            apikey: SUPABASE_KEY,
            Authorization: "Bearer " + SUPABASE_KEY,
            Prefer: "return=minimal"
          }
        });

        if (!res.ok) {
          const text = await res.text();
          setEstado("ERROR al borrar: " + text);
          return;
        }

        setEstado("registro borrado.");
        await cargar();
      } catch (error) {
        setEstado("ERROR GENERAL al borrar: " + (error?.message || error));
      }
    }

    btnRecargar.addEventListener("click", cargar);
    cargar();
  </script>
</body>
</html>
